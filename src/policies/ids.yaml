version: 1

prefixes:
  REQ:
    pattern: '^REQ-[0-9]{3}$'
    description: Requirements artifact id

  FR:
    pattern: '^FR-[0-9]{3}$'
    description: Functional requirement id

  NFR:
    pattern: '^NFR-[0-9]{3}$'
    description: Non-functional requirement id

  AC:
    pattern: '^AC-[0-9]{3}$'
    description: Acceptance criterion id

  DL:
    pattern: '^DL-[0-9]{3}$'
    description: Discovery log entry id

  DES:
    pattern: '^DES-[0-9]{3}$'
    description: Design artifact id

  CMP:
    pattern: '^CMP-[0-9]{3}$'
    description: Component id

  DM:
    pattern: '^DM-[0-9]{3}$'
    description: Data model id

  API:
    pattern: '^API-[0-9]{3}$'
    description: API id

  DEC:
    pattern: '^DEC-[0-9]{3}$'
    description: Decision id

  PLAN:
    pattern: '^PLAN-[0-9]{3}$'
    description: Plan artifact id

  TASK:
    pattern: '^TASK-[0-9]{3}$'
    description: Task id

  DD:
    pattern: '^DD-[0-9a-f]{8}$'
    description: Docs delta entry id
