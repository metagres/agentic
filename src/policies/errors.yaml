version: 1
errors:
  MISSING_CHANGE_DIR:
    message: A change directory is required.
    fix: Use --dir <change-dir>.
  AMBIGUOUS_CHANGE_DIR:
    message: Multiple change directories match the provided value.
    fix: Choose one of the candidates.
  CHANGE_DIR_NOT_FOUND:
    message: No matching change directory was found.
    fix: Create a change directory or provide a valid --dir value.
  CONTRACT_MISSING:
    message: Required contract not found.
    fix: Restore the contract file or deploy the runtime again.
  ARTIFACT_NOT_FOUND:
    message: Required artifact not found.
    fix: Run the corresponding stage first.
  ARTIFACT_PARSE_FAILED:
    message: Artifact YAML could not be parsed.
    fix: Fix the YAML syntax.
  CONTRACT_INVALID:
    message: Contract is invalid.
    fix: Fix the contract YAML and validate contracts.
  CHECK_RUN_FAILED:
    message: Contract check execution failed.
    fix: Inspect the failing check handler and parameters.
  CANNOT_ACCEPT:
    message: The artifact cannot be accepted yet.
    fix: Resolve blocking findings and complete semantic validation.
  REVIEW_NOT_PASSING:
    message: Review is not passing.
    fix: Resolve blocking findings and complete semantic validation.
  CONFLICTING_DECISION:
    message: Conflicting review decision flags.
    fix: Use either --accept or --reject, not both.
  UNKNOWN_COMMAND:
    message: Unknown workflow or command.
    fix: Use --list-workflows to see available workflows.
  UNKNOWN_STAGE:
    message: Unknown stage.
    fix: Use a known stage name.
  UNKNOWN_STEP:
    message: Unknown step.
    fix: Use a known step name.
  INTERNAL_ERROR:
    message: Internal error.
    fix: Inspect the error details.
  PLAN_NOT_FOUND:
    message: plan.yaml not found.
    fix: Run the planning stage first.
  TASK_NOT_FOUND:
    message: Task not found in plan.yaml.
    fix: Use a valid TASK-NNN id.
  INVALID_TASK_STATUS:
    message: Invalid task status.
    fix: Use pending, in_progress, done, blocked, or skipped.
  MISSING_TASK_UPDATE_FIELDS:
    message: Task update requires both --task-id and --status.
    fix: Provide both --task-id and --status.
  CANNOT_COMPLETE:
    message: Knowledge extraction cannot complete.
    fix: Resolve validation errors and mark entries extracted.
  IMPLEMENTATION_NOT_ACCEPTED:
    message: Implementation review is not accepted.
    fix: Complete implementation review before completing knowledge extraction.
  ILLEGAL_STATUS_TRANSITION:
    message: Illegal lifecycle status transition.
    fix: Follow the lifecycle defined in src/policies/lifecycle.yaml.
  SEMANTIC_NOT_COMPLETE:
    message: Semantic validation is not complete.
    fix: Record semantic validation results with sufficient evidence.
  STRICT_FINDING:
    message: Strict mode converted an advisory finding into a blocking error.
    fix: Resolve the advisory finding or rerun without --strict.
  POLICY_INVALID:
    message: A policy file is invalid.
    fix: Fix the policy file and rerun validation.
  DOCS_INDEX_MISSING:
    message: docs/current/index.md not found.
    fix: Run sdlc docs-init or create docs/current/index.md.
  DOCS_INDEX_EXISTS:
    message: docs/current/index.md already exists.
    fix: Use --force to overwrite it.
  SCHEMAS_MISSING:
    message: No schemas directory found.
    fix: Deploy or restore the runtime schemas.
  POLICIES_MISSING:
    message: No policies directory found.
    fix: Deploy or restore the runtime policies.
  TEMPLATES_MISSING:
    message: No templates directory found.
    fix: Deploy or restore the runtime templates.

  USAGE:
    message: Invalid command usage.
    fix: Check required flags and try again.
  UNKNOWN_STAGE_FILTER:
    message: Unknown stage filter.
    fix: Use --stage requirements, design, or planning.
  MISSING_EXTRACTION_NOTE:
    message: Marking a docs-delta entry extracted requires a note.
    fix: Provide --note with at least 10 characters.
  MISSING_MARK_TARGET:
    message: Marking extracted requires an entry id or target doc.
    fix: Provide --entry-id or --target-doc.
  ENTRY_ID_NOT_FOUND:
    message: No docs-delta entry matched the provided entry id.
    fix: Use a valid DD-... entry id from docs-delta.yaml.
  TARGET_DOC_NOT_FOUND:
    message: No docs-delta entries matched the provided target doc.
    fix: Use a target_doc listed in docs-delta.yaml.
  UNPLANNED_FILE:
    message: A task changed a file not listed in the plan.
    fix: Update the plan or explain the incidental change.
  PREVIOUS_STAGE_NOT_READY:
    message: A previous stage artifact is not ready or accepted.
    fix: Complete the previous stage before finalizing this stage.
  REQUIREMENTS_NOT_READY:
    message: Requirements are not ready or accepted.
    fix: Complete requirements before finalizing downstream stages.
  ARTIFACT_INITIALIZED:
    message: A new artifact was initialized.
    fix: Continue the workflow and fill in the artifact.
  DOCS_DELTA_VALIDATION:
    message: Docs-delta validation found problems.
    fix: Fix docs-delta entries before completing knowledge extraction.
  NODE_VERSION_UNSUPPORTED:
    message: Node.js version is not supported.
    fix: Use Node.js 20 or newer.
  MANIFEST_INVALID:
    message: Deployed runtime manifest is invalid.
    fix: Redeploy the runtime with bin/deploy-to-agent.mjs.
