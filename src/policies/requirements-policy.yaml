    partial:
      required_lenses:
        - stakeholder
        - interface
        - failure
        - constraint
      min_resolved_questions: 5

    vague:
      required_lenses:
        - stakeholder
        - scope
        - interface
        - behavior
        - failure
        - constraint
      min_resolved_questions: 8
