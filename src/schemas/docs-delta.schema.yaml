$schema: http://json-schema.org/draft-07/schema#
title: Docs Delta
type: object
additionalProperties: true
required:
  - metadata
  - validation_errors
  - entries
properties:
  metadata:
    type: object
    additionalProperties: true
    required:
      - stage
      - status
      - created
      - updated
      - change_root
    properties:
      stage:
        type: string
      status:
        type: string
        enum:
          - pending
          - complete
      created:
        type: string
        pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
      updated:
        type: string
        pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
      change_root:
        type: string
      implementation_status:
        type:
          - string
          - "null"
  validation_errors:
    type: array
  entries:
    type: array
  archived_entries:
    type: array
