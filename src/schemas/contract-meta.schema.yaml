{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "Contract Meta Schema",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "artifact",
    "checks"
  ],
  "properties": {
    "artifact": {
      "type": "string"
    },
    "schema_version": {
      "type": "string"
    },
    "checks": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "id",
          "type",
          "severity",
          "category",
          "message",
          "fix"
        ],
        "properties": {
          "id": {
            "type": "string"
          },
          "type": {
            "type": "string"
          },
          "severity": {
            "type": "string",
            "enum": [
              "blocking",
              "major",
              "minor",
              "info"
            ]
          },
          "category": {
            "type": "string",
            "enum": [
              "structural",
              "traceability",
              "completeness",
              "ambiguity",
              "security",
              "performance",
              "process",
              "quality"
            ]
          },
          "message": {
            "type": "string"
          },
          "fix": {
            "type": "string"
          },
          "gates": {
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "params": {
            "type": "object",
            "additionalProperties": true
          }
        }
      }
    },
    "semantic_checks": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": false,
        "required": [
          "id",
          "severity",
          "category",
          "description"
        ],
        "properties": {
          "id": {
            "type": "string"
          },
          "severity": {
            "type": "string",
            "enum": [
              "blocking",
              "major",
              "minor",
              "info"
            ]
          },
          "category": {
            "type": "string",
            "enum": [
              "structural",
              "traceability",
              "completeness",
              "ambiguity",
              "security",
              "performance",
              "process",
              "quality"
            ]
          },
          "description": {
            "type": "string"
          }
        }
      }
    }
  }
}
