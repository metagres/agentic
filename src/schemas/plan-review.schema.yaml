{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "Plan Review File",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "metadata",
    "rounds"
  ],
  "properties": {
    "metadata": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "artifact",
        "target",
        "latest_round"
      ],
      "properties": {
        "artifact": {
          "type": "string"
        },
        "target": {
          "type": "string",
          "enum": [
            "plan"
          ]
        },
        "latest_round": {
          "type": "integer",
          "minimum": 0
        },
        "latest_decision": {
          "type": [
            "string",
            "null"
          ],
          "enum": [
            "review",
            "accepted",
            "rejected",
            "accept_blocked",
            null
          ]
        },
        "created": {
          "type": "string",
          "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        },
        "updated": {
          "type": "string",
          "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        }
      }
    },
    "rounds": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "round",
          "reviewed_at",
          "decision",
          "can_accept"
        ],
        "properties": {
          "round": {
            "type": "integer",
            "minimum": 1
          },
          "reviewed_at": {
            "type": "string"
          },
          "artifact_version": {
            "type": [
              "string",
              "null"
            ]
          },
          "decision": {
            "type": "string",
            "enum": [
              "review",
              "accepted",
              "rejected",
              "accept_blocked"
            ]
          },
          "can_accept": {
            "type": "boolean"
          },
          "implementation_status": {
            "type": [
              "string",
              "null"
            ]
          }
        }
      }
    }
  }
}
