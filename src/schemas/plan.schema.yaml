$schema: http://json-schema.org/draft-07/schema#
title: Plan Artifact
type: object
additionalProperties: true
required:
  - metadata
  - tasks
  - milestones
  - risks
  - delta
  - semantic_validation
properties:
  metadata:
    type: object
    additionalProperties: true
    required:
      - id
      - title
      - stage
      - status
      - version
      - created
      - updated
      - based_on_design
      - based_on_requirements
    properties:
      id:
        type: string
        pattern: '^PLAN-[0-9]{3}$'
      title:
        type: string
      stage:
        type: string
        const: planning
      status:
        type: string
        enum:
          - draft
          - ready-for-review
          - accepted
          - rejected
          - blocked
      version:
        type: string
        pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
      created:
        type: string
        pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
      updated:
        type: string
        pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
      based_on_design:
        type:
          - string
          - "null"
      based_on_requirements:
        type:
          - string
          - "null"
      implementation_status:
        type: string
        enum:
          - pending
          - in_progress
          - ready-for-review
          - accepted
          - rejected
  tasks:
    type: array
  milestones:
    type: array
  risks:
    type: array
  delta:
    type: array
  semantic_validation:
    type: array
