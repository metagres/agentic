{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "Plan Artifact",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "metadata",
    "tasks",
    "milestones",
    "risks",
    "delta",
    "semantic_validation"
  ],
  "properties": {
    "metadata": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "id",
        "title",
        "stage",
        "status",
        "version",
        "created",
        "updated",
        "based_on_design",
        "based_on_requirements"
      ],
      "properties": {
        "id": {
          "type": "string",
          "pattern": "^PLAN-[0-9]{3}$"
        },
        "title": {
          "type": "string"
        },
        "stage": {
          "type": "string",
          "const": "planning"
        },
        "step": {
          "type": "string"
        },
        "status": {
          "type": "string",
          "enum": [
            "draft",
            "ready-for-review",
            "accepted",
            "rejected",
            "blocked"
          ]
        },
        "version": {
          "type": "string",
          "pattern": "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        },
        "created": {
          "type": "string",
          "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        },
        "updated": {
          "type": "string",
          "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        },
        "based_on_design": {
          "type": [
            "string",
            "null"
          ]
        },
        "based_on_requirements": {
          "type": [
            "string",
            "null"
          ]
        },
        "implementation_status": {
          "type": "string",
          "enum": [
            "pending",
            "in_progress",
            "ready-for-review",
            "accepted",
            "rejected"
          ]
        },
        "delta_reviewed": {
          "type": "boolean"
        }
      }
    },
    "tasks": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "id",
          "title",
          "description",
          "type",
          "status",
          "covers",
          "acceptance_ids"
        ],
        "properties": {
          "id": {
            "type": "string",
            "pattern": "^TASK-[0-9]{3}$"
          },
          "title": {
            "type": "string"
          },
          "description": {
            "type": "string"
          },
          "type": {
            "type": "string",
            "enum": [
              "analysis",
              "setup",
              "implementation",
              "refactor",
              "test",
              "verification",
              "release",
              "documentation"
            ]
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "in_progress",
              "done",
              "blocked",
              "skipped"
            ]
          },
          "complexity": {
            "type": "string",
            "enum": [
              "low",
              "medium",
              "high"
            ]
          },
          "covers": {
            "type": "array",
            "minItems": 1,
            "items": {
              "type": "string",
              "pattern": "^(FR|NFR)-[0-9]{3}$"
            }
          },
          "acceptance_ids": {
            "type": "array",
            "minItems": 1,
            "items": {
              "type": "string",
              "pattern": "^AC-[0-9]{3}$"
            }
          },
          "design_refs": {
            "type": "array",
            "items": {
              "type": "string",
              "pattern": "^DEC-[0-9]{3}$"
            }
          },
          "depends_on": {
            "type": "array",
            "items": {
              "type": "string",
              "pattern": "^TASK-[0-9]{3}$"
            }
          },
          "files": {
            "type": "array",
            "items": {
              "type": "object",
              "additionalProperties": true,
              "required": [
                "path",
                "operation"
              ],
              "properties": {
                "path": {
                  "type": "string"
                },
                "operation": {
                  "type": "string",
                  "enum": [
                    "create",
                    "modify",
                    "delete"
                  ]
                }
              }
            }
          },
          "implementation_note": {
            "type": [
              "string",
              "null"
            ]
          },
          "started_at": {
            "type": [
              "string",
              "null"
            ]
          },
          "completed_at": {
            "type": [
              "string",
              "null"
            ]
          },
          "files_changed": {
            "type": "array",
            "items": {
              "type": "object",
              "additionalProperties": true,
              "properties": {
                "path": {
                  "type": "string"
                },
                "operation": {
                  "type": "string",
                  "enum": [
                    "create",
                    "modify",
                    "delete"
                  ]
                }
              }
            }
          }
        }
      }
    },
    "milestones": {
      "type": "array"
    },
    "risks": {
      "type": "array"
    },
    "delta": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "phase",
          "target_doc",
          "change",
          "reason",
          "date"
        ],
        "properties": {
          "phase": {
            "type": "string",
            "enum": [
              "Planning"
            ]
          },
          "target_doc": {
            "type": "string"
          },
          "target_anchor": {
            "type": [
              "string",
              "null"
            ]
          },
          "entity_id": {
            "type": [
              "string",
              "null"
            ]
          },
          "change": {
            "type": "string",
            "enum": [
              "Add",
              "Modify",
              "Remove"
            ]
          },
          "reason": {
            "type": "string"
          },
          "date": {
            "type": "string",
            "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
          }
        }
      }
    },
    "semantic_validation": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "check_id",
          "status",
          "evidence",
          "evaluated_at"
        ],
        "properties": {
          "check_id": {
            "type": "string"
          },
          "status": {
            "type": "string",
            "enum": [
              "pass",
              "fail",
              "waived"
            ]
          },
          "evidence": {
            "type": "string"
          },
          "evaluated_at": {
            "type": "string",
            "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
          }
        }
      }
    }
  }
}
