$schema: http://json-schema.org/draft-07/schema#
title: Review File
type: object
additionalProperties: true
required:
  - metadata
  - rounds
properties:
  metadata:
    type: object
    additionalProperties: true
    required:
      - artifact
      - target
      - latest_round
    properties:
      artifact:
        type: string
      target:
        type: string
      latest_round:
        type: integer
      latest_decision:
        type: string
      created:
        type: string
      updated:
        type: string
  rounds:
    type: array
    items:
      type: object
      additionalProperties: true
      required:
        - round
        - reviewed_at
        - decision
        - can_accept
      properties:
        round:
          type: integer
        reviewed_at:
          type: string
        artifact_version:
          type:
            - string
            - "null"
        decision:
          type: string
          enum:
            - review
            - accepted
            - rejected
            - accept_blocked
        can_accept:
          type: boolean
        implementation_status:
          type:
            - string
            - "null"
