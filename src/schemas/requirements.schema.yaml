$schema: http://json-schema.org/draft-07/schema#
title: Requirements Artifact
type: object
additionalProperties: true
required:
  - metadata
  - problem_statement
  - discovery_log
  - assumptions
  - functional_requirements
  - non_functional_requirements
  - acceptance_criteria
  - out_of_scope
  - failure_paths
  - risks_and_dependencies
  - delta
  - semantic_validation
properties:
  metadata:
    type: object
    additionalProperties: true
    required:
      - id
      - title
      - stage
      - status
      - version
      - created
      - updated
      - request_summary
      - clarity
      - assumptions_reviewed
      - delta_reviewed
    properties:
      id:
        type: string
        pattern: '^REQ-[0-9]{3}$'
      title:
        type: string
      stage:
        type: string
        const: requirements
      status:
        type: string
        enum:
          - draft
          - ready-for-review
          - accepted
          - rejected
          - blocked
      version:
        type: string
        pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
      created:
        type: string
        pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
      updated:
        type: string
        pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
      request_summary:
        type: string
      clarity:
        type: string
        enum:
          - clear
          - partial
          - vague
      assumptions_reviewed:
        type: boolean
      delta_reviewed:
        type: boolean
  problem_statement:
    type: string
  discovery_log:
    type: array
  assumptions:
    type: array
  functional_requirements:
    type: array
  non_functional_requirements:
    type: array
  acceptance_criteria:
    type: array
  out_of_scope:
    type: array
  failure_paths:
    type: array
  risks_and_dependencies:
    type: array
  delta:
    type: array
  semantic_validation:
    type: array
