{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "title": "Requirements Artifact",
  "type": "object",
  "additionalProperties": false,
  "required": [
    "metadata",
    "problem_statement",
    "discovery_log",
    "assumptions",
    "functional_requirements",
    "non_functional_requirements",
    "acceptance_criteria",
    "out_of_scope",
    "failure_paths",
    "risks_and_dependencies",
    "delta",
    "semantic_validation"
  ],
  "properties": {
    "metadata": {
      "type": "object",
      "additionalProperties": false,
      "required": [
        "id",
        "title",
        "stage",
        "status",
        "version",
        "created",
        "updated",
        "request_summary",
        "clarity",
        "assumptions_reviewed",
        "delta_reviewed"
      ],
      "properties": {
        "id": {
          "type": "string",
          "pattern": "^REQ-[0-9]{3}$"
        },
        "title": {
          "type": "string"
        },
        "stage": {
          "type": "string",
          "const": "requirements"
        },
        "step": {
          "type": "string"
        },
        "status": {
          "type": "string",
          "enum": [
            "draft",
            "ready-for-review",
            "accepted",
            "rejected",
            "blocked"
          ]
        },
        "version": {
          "type": "string",
          "pattern": "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        },
        "created": {
          "type": "string",
          "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        },
        "updated": {
          "type": "string",
          "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        },
        "request_summary": {
          "type": "string"
        },
        "clarity": {
          "type": "string",
          "enum": [
            "clear",
            "partial",
            "vague"
          ]
        },
        "assumptions_reviewed": {
          "type": "boolean"
        },
        "delta_reviewed": {
          "type": "boolean"
        }
      }
    },
    "problem_statement": {
      "type": "string"
    },
    "discovery_log": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "id",
          "question",
          "answer",
          "resolved"
        ],
        "properties": {
          "id": {
            "type": "string",
            "pattern": "^DL-[0-9]{3}$"
          },
          "question": {
            "type": "string"
          },
          "answer": {
            "type": "string"
          },
          "lens": {
            "type": "string",
            "enum": [
              "stakeholder",
              "scope",
              "interface",
              "behavior",
              "design",
              "constraint",
              "failure",
              "outcome"
            ]
          },
          "resolved": {
            "type": "boolean"
          }
        }
      }
    },
    "assumptions": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "type",
          "text"
        ],
        "properties": {
          "type": {
            "type": "string",
            "enum": [
              "verified",
              "unverified"
            ]
          },
          "text": {
            "type": "string"
          },
          "source": {
            "type": "string"
          },
          "risk": {
            "type": "string"
          },
          "question": {
            "type": "string"
          },
          "impact": {
            "type": "string"
          },
          "severity": {
            "type": "string",
            "enum": [
              "critical",
              "high",
              "medium",
              "low"
            ]
          }
        }
      }
    },
    "functional_requirements": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "id",
          "description",
          "ac_ids"
        ],
        "properties": {
          "id": {
            "type": "string",
            "pattern": "^FR-[0-9]{3}$"
          },
          "description": {
            "type": "string"
          },
          "ac_ids": {
            "type": "array",
            "minItems": 1,
            "items": {
              "type": "string",
              "pattern": "^AC-[0-9]{3}$"
            }
          }
        }
      }
    },
    "non_functional_requirements": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "id",
          "description",
          "ac_ids"
        ],
        "properties": {
          "id": {
            "type": "string",
            "pattern": "^NFR-[0-9]{3}$"
          },
          "description": {
            "type": "string"
          },
          "ac_ids": {
            "type": "array",
            "minItems": 1,
            "items": {
              "type": "string",
              "pattern": "^AC-[0-9]{3}$"
            }
          }
        }
      }
    },
    "acceptance_criteria": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "id",
          "statement",
          "parent_id"
        ],
        "properties": {
          "id": {
            "type": "string",
            "pattern": "^AC-[0-9]{3}$"
          },
          "statement": {
            "type": "string"
          },
          "parent_id": {
            "type": "string",
            "pattern": "^(FR|NFR)-[0-9]{3}$"
          }
        }
      }
    },
    "out_of_scope": {
      "type": "array",
      "items": {
        "type": [
          "string",
          "object"
        ]
      }
    },
    "failure_paths": {
      "type": "array",
      "items": {
        "type": [
          "string",
          "object"
        ]
      }
    },
    "risks_and_dependencies": {
      "type": "array",
      "items": {
        "type": [
          "string",
          "object"
        ]
      }
    },
    "delta": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "phase",
          "target_doc",
          "change",
          "reason",
          "date"
        ],
        "properties": {
          "phase": {
            "type": "string",
            "enum": [
              "Requirements"
            ]
          },
          "target_doc": {
            "type": "string"
          },
          "target_anchor": {
            "type": [
              "string",
              "null"
            ]
          },
          "entity_id": {
            "type": [
              "string",
              "null"
            ]
          },
          "change": {
            "type": "string",
            "enum": [
              "Add",
              "Modify",
              "Remove"
            ]
          },
          "reason": {
            "type": "string"
          },
          "date": {
            "type": "string",
            "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
          }
        }
      }
    },
    "semantic_validation": {
      "type": "array",
      "items": {
        "type": "object",
        "additionalProperties": true,
        "required": [
          "check_id",
          "status",
          "evidence",
          "evaluated_at"
        ],
        "properties": {
          "check_id": {
            "type": "string"
          },
          "status": {
            "type": "string",
            "enum": [
              "pass",
              "fail",
              "waived"
            ]
          },
          "evidence": {
            "type": "string"
          },
          "evaluated_at": {
            "type": "string",
            "pattern": "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
          }
        }
      }
    }
  }
}
